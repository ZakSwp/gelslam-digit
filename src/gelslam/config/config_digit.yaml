# Configuration of the Device
device_config:
  # Device Name
  device_name: "DIGIT"
  # Pixel Per Millimeter
  ppmm: 0.0405
  # Desired Image Width and Height should be equivalent to resized
  imgh: 240
  imgw: 320
  # Raw image width, height, and framerate
  raw_imgh: 480
  raw_imgw: 640
  framerate: 60
  # Path to calibration model (absolute, or relative to this config file)
  calibration_model_path: "/home/zakaria/Desktop/gelslam/gelslam/src/gelslam/resources/example_calibration/model/nnmodel_digit.pth"


# Configuration of how contact mask is thresholded
contact_mask_config:
  color_dist_threshold: 15
  height_threshold: 0.2

# GelSLAM configuration
gelslam_config:
  # Configuration of how GelSLAM tracks
  track_config:
    contact_threshold: 500
    scr_threshold: 0.3
    ccs_threshold: 0.7
  # Configuration of how GelSLAM builds pose graph and loop closure
  pose_graph_config:
    coverage_graph_overlap_threshold: 50
    min_sift_inliers: 8
    scr_threshold: 0.3
    ccs_threshold: 0.7

